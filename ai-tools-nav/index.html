<style>
:root {
  --bg-primary: #0f0f14;
  --bg-secondary: #16161e;
  --bg-card: #1c1c28;
  --bg-card-hover: #24243a;
  --border: #2a2a3e;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a0;
  --accent: #6c5ce7;
  --accent-light: #a29bfe;
  --accent-glow: rgba(108,92,231,0.15);
  --green: #00cec9;
  --orange: #fdcb6e;
  --pink: #fd79a8;
  --red: #ff7675;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

a { color: inherit; text-decoration: none; }

/* Header */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.search-box {
  flex: 1;
  max-width: 420px;
  margin: 0 32px;
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 24px;
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.search-box input:focus { border-color: var(--accent); }

.search-box::before {
  content: '🔍';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
}

.header-stats {
  font-size: 13px;
  color: var(--text-secondary);
}

/* Categories */
.categories {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 24px 0;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.cat-btn {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.cat-btn:hover { border-color: var(--accent); color: var(--text-primary); }
.cat-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.cat-count {
  font-size: 11px;
  opacity: 0.7;
  margin-left: 4px;
}

/* Main Content */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

/* Ad Banner */
.ad-banner {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 32px;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}

.ad-banner::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 200px; height: 100%;
  background: linear-gradient(135deg, transparent, rgba(108,92,231,0.08));
}

.ad-tag {
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 10px;
  color: var(--text-secondary);
  opacity: 0.5;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.ad-banner h3 { font-size: 18px; margin-bottom: 6px; }
.ad-banner p { color: var(--text-secondary); font-size: 14px; }

.ad-btn {
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  z-index: 1;
  transition: opacity 0.2s;
}

.ad-btn:hover { opacity: 0.9; }

/* Section Title */
.section-title {
  font-size: 16px;
  font-weight: 600;
  margin: 32px 0 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Tool Grid */
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.tool-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}

.tool-card:hover {
  border-color: var(--accent);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.tool-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}

.tool-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.tool-info { flex: 1; min-width: 0; }
.tool-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.tool-maker { font-size: 12px; color: var(--text-secondary); }

.tool-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tool-tags { display: flex; gap: 6px; flex-wrap: wrap; }

.tag {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  background: var(--accent-glow);
  color: var(--accent-light);
  border: 1px solid rgba(108,92,231,0.2);
}

.tag.free { background: rgba(0,206,201,0.1); color: var(--green); border-color: rgba(0,206,201,0.2); }
.tag.paid { background: rgba(253,203,110,0.1); color: var(--orange); border-color: rgba(253,203,110,0.2); }
.tag.hot { background: rgba(253,121,168,0.1); color: var(--pink); border-color: rgba(253,121,168,0.2); }
.tag.new { background: rgba(255,118,117,0.1); color: var(--red); border-color: rgba(255,118,117,0.2); }

/* Sidebar Ad */
.content-layout {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}

.content-main { flex: 1; min-width: 0; }

.sidebar {
  width: 280px;
  flex-shrink: 0;
  position: sticky;
  top: 80px;
}

.sidebar-ad {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  margin-bottom: 16px;
}

.sidebar-ad .ad-tag {
  position: static;
  display: block;
  margin-bottom: 12px;
}

.sidebar-ad h4 { font-size: 15px; margin-bottom: 8px; }
.sidebar-ad p { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }

.sidebar-ad-btn {
  display: inline-block;
  padding: 8px 20px;
  background: var(--accent);
  color: #fff;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.sidebar-ad-btn:hover { opacity: 0.9; }

/* Sidebar List */
.sidebar-list {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.sidebar-list h4 {
  font-size: 14px;
  margin-bottom: 12px;
  color: var(--text-secondary);
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  cursor: pointer;
  transition: color 0.2s;
}

.sidebar-item:last-child { border-bottom: none; }
.sidebar-item:hover { color: var(--accent-light); }

.sidebar-rank {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
}

.sidebar-rank.top { background: var(--accent); color: #fff; }

/* Footer */
.footer {
  max-width: 1200px;
  margin: 48px auto 0;
  padding: 24px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
}

.footer-links { margin-bottom: 8px; }
.footer-links a { margin: 0 12px; transition: color 0.2s; }
.footer-links a:hover { color: var(--accent-light); }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .ad-banner { flex-direction: column; gap: 16px; text-align: center; }
}

@media (max-width: 640px) {
  .header-inner { flex-wrap: wrap; gap: 12px; }
  .search-box { order: 3; max-width: 100%; margin: 0; flex-basis: 100%; }
  .tool-grid { grid-template-columns: 1fr; }
  .categories { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 12px; }
}

/* Animations */
.tool-card { animation: fadeUp 0.4s ease both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* No results */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.no-results .emoji { font-size: 48px; margin-bottom: 16px; }
</style>
</head>

  { name: 'Coze', maker: '字节跳动', desc: '零代码AI应用构建平台，插件生态丰富', icon: '🤖', iconBg: '#3b82f6', category: 'AI Agent', tags: ['免费', '热门'] },
  { name: 'n8n', maker: 'n8n', desc: '开源工作流自动化，连接AI与各种服务', icon: '🔗', iconBg: '#ea4b71', category: 'AI Agent', tags: ['免费+付费'] },
  { name: 'LangChain', maker: 'LangChain', desc: 'LLM应用开发框架，RAG、Agent、Chain', icon: '🦜', iconBg: '#000', category: 'AI Agent', tags: ['免费', '新'] },
];

// ===== 分类配置 =====
const categoryConfig = {
  '对话助手': { emoji: '💬', color: '#6c5ce7' },
  'AI写作': { emoji: '✍️', color: '#00cec9' },
  'AI设计': { emoji: '🎨', color: '#fd79a8' },
  'AI编程': { emoji: '💻', color: '#fdcb6e' },
  'AI视频': { emoji: '🎬', color: '#ff7675' },
  'AI音频': { emoji: '🎵', color: '#a29bfe' },
  'AI办公': { emoji: '📊', color: '#55efc4' },
  'AI Agent': { emoji: '🤖', color: '#fab1a0' },
};

let currentCategory = '全部';

// ===== 渲染 =====
function renderCategories() {
  const container = document.getElementById('categoriesContainer');
  const cats = ['全部', ...Object.keys(categoryConfig)];

  container.innerHTML = cats.map(cat => {
    const count = cat === '全部' ? tools.length : tools.filter(t => t.category === cat).length;
    return `<button class="cat-btn ${cat === currentCategory ? 'active' : ''}" onclick="selectCategory('${cat}')">
      ${cat === '全部' ? '🌐' : categoryConfig[cat].emoji} ${cat}<span class="cat-count">${count}</span>
    </button>`;
  }).join('');
}

function renderTools(filteredTools) {
  const grid = document.getElementById('toolGrid');
  const noResults = document.getElementById('noResults');

  if (filteredTools.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }

  noResults.style.display = 'none';
  grid.innerHTML = filteredTools.map((tool, i) => {
    const tagHtml = tool.tags.map(t => {
      let cls = '';
      if (t.includes('免费') && !t.includes('付费')) cls = 'free';
      else if (t.includes('付费') && !t.includes('免费')) cls = 'paid';
      else if (t.includes('热门')) cls = 'hot';
      else if (t.includes('新')) cls = 'new';
      return `<span class="tag ${cls}">${t}</span>`;
    }).join('');

    return `<div class="tool-card" style="animation-delay:${i * 0.05}s" onclick="alert('打开 ${tool.name}：功能开发中')">
      <div class="tool-header">
        <div class="tool-icon" style="background:${tool.iconBg}">${tool.icon}</div>
        <div class="tool-info">
          <div class="tool-name">${tool.name}</div>
          <div class="tool-maker">${tool.maker}</div>
        </div>
      </div>
      <div class="tool-desc">${tool.desc}</div>
      <div class="tool-tags">${tagHtml}</div>
    </div>`;
  }).join('');

  document.getElementById('statsDisplay').textContent = `共 ${filteredTools.length} 个工具`;
}

function renderHotList() {
  const hot = tools.filter(t => t.tags.includes('热门')).slice(0, 6);
  document.getElementById('hotList').innerHTML = hot.map((t, i) =>
    `<div class="sidebar-item">
      <span class="sidebar-rank ${i < 3 ? 'top' : ''}">${i + 1}</span>
      <span>${t.icon} ${t.name}</span>
    </div>`
  ).join('');
}

// ===== 筛选 =====
function selectCategory(cat) {
  currentCategory = cat;
  renderCategories();
  filterTools();
}

function filterTools() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let filtered = tools;

  if (currentCategory !== '全部') {
    filtered = filtered.filter(t => t.category === currentCategory);
  }

  if (query) {
    filtered = filtered.filter(t =>
      t.name.toLowerCase().includes(query) ||
      t.maker.toLowerCase().includes(query) ||
      t.desc.toLowerCase().includes(query) ||
      t.category.toLowerCase().includes(query)
    );
  }

  renderTools(filtered);
}

// ===== 初始化 =====
renderCategories();
renderTools(tools);
renderHotList();
</script>
</body>
</html>
